<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa · Pantalla completa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
   :root {
      --c-emergencia: #E24B4A;
      --c-encuentro:  #EF9F27;
      --c-kits:       #1D9E75;
      --c-voluntarios:#7B5EA7;
      --c-refugio:    #3A7BD5;
      --glass: rgba(255,255,255,0.96);
      --shadow: 0 2px 12px rgba(0,0,0,0.13);
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #map { width:100%; height:100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Botón cerrar ── */
    .map-close {
      position:fixed; top:12px; right:12px; z-index:1000;
      background:var(--glass); border:1px solid rgba(0,0,0,0.08);
      border-radius:50%; width:34px; height:34px;
      font-size:14px; font-weight:600; color:#444;
      cursor:pointer; box-shadow:var(--shadow);
      display:flex; align-items:center; justify-content:center;
      line-height:1;
    }
    .map-close:hover { background:#f5f5f5; color:#222; }

    /* ── Barra de búsqueda ── */
    .map-search {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      z-index:1000; width:min(400px, calc(100vw - 110px));
    }
    .map-search-inner {
      position:relative; display:flex; align-items:center;
      background:var(--glass); border:1px solid rgba(0,0,0,0.10);
      border-radius:var(--radius); box-shadow:var(--shadow); overflow:visible;
    }
    .map-search-inner:focus-within {
      border-color: var(--c-kits);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12), var(--shadow);
    }
    .map-search-icon {
      position:absolute; left:12px; color:#aaa; font-size:14px; pointer-events:none;
    }
    .map-search-inner input {
      flex:1; padding:10px 44px 10px 34px; border:none; background:transparent;
      font-size:13px; color:#222; outline:none; border-radius:var(--radius);
      min-width:0;
    }
    .map-search-inner input::placeholder { color:#bbb; }
    .map-search-btn {
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      width:30px; height:30px; border-radius:8px; border:none;
      background:var(--c-kits); color:#fff; font-size:13px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; flex-shrink:0;
    }
    .map-search-btn:hover { background:#a6b5ba8a; }
    .map-search-results {
      position:absolute; top:calc(100% + 6px); left:0; right:0;
      background:#fff; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.14);
      border:1px solid rgba(0,0,0,0.07); overflow:hidden; display:none; z-index:10;
    }
    .map-search-results.visible { display:block; }
    .map-search-result-item {
      padding:9px 14px; font-size:12px; color:#333; cursor:pointer;
      border-bottom:1px solid rgba(0,0,0,0.05); line-height:1.4;
    }
    .map-search-result-item:last-child { border-bottom:none; }
    .map-search-result-item:hover { background:#f4fbf8; color:var(--c-kits); }

    /* ── Filtros por tipo ── */
    .map-filters {
      position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
      max-width: calc(100vw - 40px);
    }
    .map-filter-btn {
      padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
      border: 2px solid transparent; cursor: pointer; transition: all 0.18s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.13); display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.97); color: #555;
    }
    .map-filter-btn .dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .map-filter-btn.active { color: #fff; }
    .map-filter-btn[data-tipo="emergencia"].active  { background: #e24b4a75; border-color: #E24B4A; }
    .map-filter-btn[data-tipo="encuentro"].active   { background: #ef9f2769; border-color: #EF9F27; }
    .map-filter-btn[data-tipo="kits"].active        { background: #1d9e757a; border-color: #1D9E75; }
    .map-filter-btn[data-tipo="voluntarios"].active { background: #7b5ea78a; border-color: #7B5EA7; }
    .map-filter-btn[data-tipo="refugio"].active     { background: #3a7bd582; border-color: #3A7BD5; }

    /* ── Leyenda con barras ── */
    .map-legend {
      position:fixed; bottom:20px; left:12px; z-index:1000;
      background:var(--glass); border:1px solid rgba(0,0,0,0.08);
      border-radius:var(--radius); padding:12px 14px;
      box-shadow:var(--shadow); min-width:190px; max-width:210px;
    }
    .map-legend-title {
      font-size:9px; font-weight:700; color:#aaa;
      text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px;
    }
    .map-legend-row {
      display:flex; flex-direction:column; gap:2px; margin-bottom:8px;
    }
    .map-legend-row:last-child { margin-bottom:0; }
    .map-legend-label-row {
      display:flex; align-items:center; justify-content:space-between; gap:6px;
    }
    .map-legend-left { display:flex; align-items:center; gap:6px; }
    .map-legend-dot {
      width:12px; height:12px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:7px; font-weight:700; color:#fff;
    }
    .map-legend-name { font-size:11px; color:#333; font-weight:500; }
    .map-legend-count { font-size:10px; color:#999; font-weight:600; }
    .map-legend-bar-track {
      height:4px; border-radius:2px; background:rgba(0,0,0,0.07); overflow:hidden;
    }
    .map-legend-bar-fill {
      height:100%; border-radius:2px; transition:width 0.4s ease;      
    }
    .map-legend-bar-fill.alto   { background: #2ecc71 !important; }
    .map-legend-bar-fill.medio  { background: #EF9F27 !important; }
    .map-legend-bar-fill.bajo   { background: #E24B4A !important; }

    .map-legend-sep {
      height:1px; background:rgba(0,0,0,0.06); margin:6px 0;
    }
    .map-legend-pin-row {
      display:flex; align-items:center; gap:6px; font-size:11px; color:#666;
    }

    .map-legend-header {
      display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; padding-bottom:8px; margin-bottom:1px;
    }
    .map-legend-header:hover span { color:#555; }
    #legendBody { overflow:hidden; transition:max-height 0.3s ease; max-height:300px; }
    #legendBody.collapsed { max-height:0; }

    /* ── Icono emergencia con ondas ── */
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(3.2); opacity: 0; }
    }
    .emergency-icon-wrapper {
      position: relative; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .emergency-ripple {
      position: absolute; border-radius: 50%;
      border: 2px solid #E24B4A; opacity: 0;
      animation: ripple 1.8s ease-out infinite;
    }
    .emergency-ripple:nth-child(1) { width: 36px; height: 36px; animation-delay: 0s; }
    .emergency-ripple:nth-child(2) { width: 36px; height: 36px; animation-delay: 0.6s; }
    .emergency-ripple:nth-child(3) { width: 36px; height: 36px; animation-delay: 1.2s; }
    .emergency-core {
      width: 26px; height: 26px; border-radius: 50%; background: #E24B4A;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      box-shadow: 0 3px 10px rgba(226,75,74,0.5); border: 2px solid rgba(255,255,255,0.4);
      position: relative; z-index: 1;
    }
	
	/* ── Mobile tweaks ── */

    @media (max-width: 480px) {
      /* X más pequeña y separada del buscador */
      .map-close {
        top:10px; right:8px;
        width:30px; height:30px; font-size:12px;
      }
      /* Buscador deja espacio a la derecha para la X */
      .map-search {
        top:10px;
        left:8px;
        transform:none;
        width:calc(100vw - 50px);
      }
      .map-search-inner input { font-size:13px; padding:9px 40px 9px 32px; }

      /* Filtros bajan suficiente para no tapar el buscador */
        .map-filters {
          top:58px;
          left:0; right:0;
          transform:none;
          width:100vw;
          box-sizing:border-box;
          flex-wrap:wrap;
          overflow-x:hidden;
          overflow-y:visible;
          justify-content:flex-start;
          padding:0 8px 4px 8px;
          gap:4px;
          max-width:100vw;
        }
        .map-filter-btn { font-size:11px; padding:5px 9px; flex-shrink:0; }
      .map-filters::-webkit-scrollbar { display:none; }
      .map-filter-btn { font-size:11px; padding:5px 10px; flex-shrink:0; }

      .map-legend { bottom:16px; left:8px; min-width:170px; max-width:185px; padding:10px 11px; }
      .map-legend-name { font-size:10px; }
    }
  </style>
</head>

<body>

 <button class="map-close" onclick="window.close()">✕</button>

  <!-- Búsqueda -->
  <div class="map-search" id="searchBar">
    <div class="map-search-inner">
      <span class="map-search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar dirección…" autocomplete="off"
        onkeydown="if(event.key==='Enter') doSearch()" oninput="onSearchInput()"/>
      <button class="map-search-btn" onclick="doSearch()" title="Buscar">›</button>
      <div class="map-search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="map-filters" id="mapFilters">
    <button class="map-filter-btn active" data-tipo="emergencia" onclick="toggleFilter(this)">
      <span class="dot" style="background:#E24B4A;"></span> Emergencia
    </button>
    <button class="map-filter-btn active" data-tipo="encuentro" onclick="toggleFilter(this)">
      <span class="dot" style="background:#EF9F27;"></span> Punto encuentro
    </button>
    <button class="map-filter-btn active" data-tipo="kits" onclick="toggleFilter(this)">
      <span class="dot" style="background:#1D9E75;"></span> Recogida kits
    </button>
    <button class="map-filter-btn active" data-tipo="voluntarios" onclick="toggleFilter(this)">
      <span class="dot" style="background:#7B5EA7;"></span> Voluntarios
    </button>
    <button class="map-filter-btn active" data-tipo="refugio" onclick="toggleFilter(this)">
      <span class="dot" style="background:#3A7BD5;"></span> Refugio
    </button>
  </div>

   <!-- Leyenda -->
  <div class="map-legend" id="mapLegend">
    <div class="map-legend-header" onclick="toggleLegend()">
      <span class="map-legend-title" style="margin-bottom:0;">Cobertura de necesidades</span>
      <span id="legendToggleIcon" style="font-size:10px;color:#aaa;">▲</span>
    </div>
    <div id="legendBody"></div>
  </div>

  <div id="map"></div>

  <script>
    // ── Datos ──

    var TIPOS = [
      { tipo:'emergencia',  label:'Emergencia',       color:'#E24B4A', icon:'🚨' },
      { tipo:'encuentro',   label:'Punto encuentro',  color:'#EF9F27', icon:'P'  },
      { tipo:'kits',        label:'Recogida kits',    color:'#1D9E75', icon:'K'  },
      { tipo:'voluntarios', label:'Voluntarios',      color:'#7B5EA7', icon:'V'  },
      { tipo:'refugio',     label:'Refugio',          color:'#3A7BD5', icon:'R'  }
    ];

    var mapData = {};
    try { mapData = JSON.parse(sessionStorage.getItem('necMapData') || '{}'); } catch(e){}

    var lat    = mapData.lat    || 39.4617;
    var lng    = mapData.lng    || -0.3854;
    var zoom   = mapData.zoom   || 16;
    var pinLat = mapData.pinLat || lat;
    var pinLng = mapData.pinLng || lng;
    var pinsValidados = mapData.pins || [];
    var ctxPins       = mapData.ctx  || [];

    // ── Fallback demo si no hay datos reales ──
    if (!ctxPins.length) {
      ctxPins = [
        { lat:39.4571, lng:-0.3901, color:'#1D9E75', icon:'K', tipo:'kits',
          direccion:'Polideportivo Russafa', detalle:'Kits de emergencia · 200 unidades disponibles', nota:'Horario: 9h–20h' },
        { lat:39.4648, lng:-0.3823, color:'#7B5EA7', icon:'V', tipo:'voluntarios',
          direccion:'C/ Cuba, 5 — Russafa', detalle:'12 voluntarios disponibles', nota:'Coordinador: Luis M.' },
        { lat:39.4582, lng:-0.3858, color:'#EF9F27', icon:'P', tipo:'encuentro',
          direccion:'Pl. Ayuntamiento', detalle:'Punto de concentración principal', nota:'Capacidad: sin límite' },
        { lat:39.4655, lng:-0.3875, color:'#3A7BD5', icon:'R', tipo:'refugio',
          direccion:'C/ Colón, 40', detalle:'Ofrecer espacio · 30 plazas disponibles', nota:'Acceso adaptado, planta baja' },
        { lat:39.4594, lng:-0.3812, color:'#E24B4A', icon:'🚨', tipo:'emergencia',
          direccion:'Avda. del Puerto, 12', detalle:'Zona de intervención activa', nota:'Coordinado con Bomberos' },
        { lat:39.4637, lng:-0.3844, color:'#1D9E75', icon:'K', tipo:'kits',
          direccion:'C/ Xàtiva, 8', detalle:'Kits de emergencia · 80 unidades', nota:'Turno tarde activo' },
        { lat:39.4609, lng:-0.3891, color:'#3A7BD5', icon:'R', tipo:'refugio',
          direccion:'Pl. del Mercat', detalle:'Ofrecer espacio · 20 plazas disponibles', nota:'Solo adultos' },
        { lat:39.4662, lng:-0.3856, color:'#7B5EA7', icon:'V', tipo:'voluntarios',
          direccion:'Zona Sur — C/ Sueca', detalle:'8 voluntarios disponibles', nota:'Especialidad: primeros auxilios' }
      ];
    }

    var tieneDatos = pinsValidados.length && pinsValidados.some(function(p){ return p.estado; });
    if (!tieneDatos) {
      pinsValidados = [
        { lat:39.4578, lng:-0.3867, tipo:'kits',        color:'#1D9E75', icon:'K', estado:'resuelta',
          direccion:'C/ Literato Azorín, 3', detalle:'Kit entregado · Familia Martínez', nota:'2 adultos, 1 menor' },
        { lat:39.4643, lng:-0.3810, tipo:'voluntarios', color:'#7B5EA7', icon:'V', estado:'resuelta',
          direccion:'Zona Norte — C/ Russafa', detalle:'Voluntario asignado', nota:'Acompañamiento persona mayor' },
        { lat:39.4617, lng:-0.3893, tipo:'encuentro',   color:'#EF9F27', icon:'P', estado:'pendiente',
          direccion:'Pl. España', detalle:'Grupo de 5 personas esperando', nota:'Llegada estimada: 15 min' },
        { lat:39.4660, lng:-0.3831, tipo:'refugio',     color:'#3A7BD5', icon:'R', estado:'pendiente',
          direccion:'C/ Mayor, 5', detalle:'Solicita alojamiento · 3 personas', nota:'Familia con mascota' },
        { lat:39.4585, lng:-0.3848, tipo:'emergencia',  color:'#E24B4A', icon:'🚨', estado:'pendiente',
          direccion:'Avda. del Puerto, 18', detalle:'Herido leve · unidad SAMU en camino', nota:'Prioridad media' },
        { lat:39.4630, lng:-0.3878, tipo:'kits',        color:'#1D9E75', icon:'K', estado:'pendiente',
          direccion:'C/ Ruzafa, 3', detalle:'Solicita kit básico · 1 persona', nota:'Sin desplazamiento' },
        { lat:39.4598, lng:-0.3820, tipo:'refugio',     color:'#3A7BD5', icon:'R', estado:'pendiente',
          direccion:'Albergue Central', detalle:'Plaza asignada · cubierto', nota:'Check-in completado' },
        { lat:39.4651, lng:-0.3863, tipo:'voluntarios', color:'#7B5EA7', icon:'V', estado:'resuelta',
          direccion:'Zona Sur', detalle:'Solicita apoyo · carga y transporte', nota:'Urgencia baja' },
        { lat:39.4574, lng:-0.3835, tipo:'emergencia',  color:'#E24B4A', icon:'🚨', estado:'resuelta',
          direccion:'C/ del Mar, 7', detalle:'Atendido por SAMU', nota:'Alta en sitio' },
        { lat:39.4623, lng:-0.3807, tipo:'encuentro',   color:'#EF9F27', icon:'P', estado:'resuelta',
          direccion:'Av. Blasco Ibáñez', detalle:'2 personas sin localizar grupo', nota:'Comunicación pendiente' },
        { lat:39.4566, lng:-0.3844, tipo:'kits',        color:'#1D9E75', icon:'K', estado:'pendiente',
          direccion:'C/ Denia, 11', detalle:'Solicita kit · persona sola', nota:'Movilidad reducida' },
        { lat:39.4672, lng:-0.3819, tipo:'refugio',     color:'#3A7BD5', icon:'R', estado:'resuelta',
          direccion:'C/ Cirilo Amorós, 4', detalle:'Plaza confirmada', nota:'2 noches estimadas' },
        { lat:39.4589, lng:-0.3802, tipo:'voluntarios', color:'#7B5EA7', icon:'V', estado:'pendiente',
          direccion:'Av. Reino de Valencia', detalle:'Solicita voluntario · mudanza urgente', nota:'Requiere vehículo' }
      ];
    }

    // ── Mapa ──
    var map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView([lat, lng], zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:19, subdomains:['a','b','c'], attribution:'© OpenStreetMap'
    }).addTo(map);

    // ── Iconos ──
    function makeIcon(color, icon, size) {
      var fs = Math.round(size * 0.42);
      return L.divIcon({
        className:'',
        html:'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:700;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.35);border:2px solid rgba(255,255,255,0.35);">'+icon+'</div>',
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-(size/2+8)]
      });
    }
    function makeEmergencyIcon(size) {
      size = size || 36;
      return L.divIcon({
        className:'',
        html:'<div class="emergency-icon-wrapper" style="width:'+size+'px;height:'+size+'px;">'+
             '<div class="emergency-ripple"></div><div class="emergency-ripple"></div><div class="emergency-ripple"></div>'+
             '<div class="emergency-core" style="width:'+(size-10)+'px;height:'+(size-10)+'px;font-size:'+Math.round(size*0.3)+'px;">🚨</div>'+
             '</div>',
        iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-(size/2+8)]
      });
    }
    function pinIcon(color) {
      return L.divIcon({
        className:'',
        html:'<div style="position:relative;width:28px;height:36px;"><div style="width:28px;height:28px;border-radius:50% 50% 50% 0;background:'+color+';transform:rotate(-45deg);box-shadow:0 3px 10px rgba(0,0,0,0.35);border:2px solid rgba(255,255,255,0.4);"></div><div style="position:absolute;top:6px;left:6px;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:9px;">📍</div></div>',
        iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-38]
      });
    }


    // ── Popup estilizado ──
    var ESTADO_CFG = {
      resuelta:    { bg:'#CCFBEF', color:'#0E4D38', border:'#6EE7B7', txt:'✓ Validada'    },
      en_atencion: { bg:'#FEF3C7', color:'#78350F', border:'#FCD34D', txt:'⏳ En atención' },
      pendiente:   { bg:'#FEE2E2', color:'#7F1D1D', border:'#FCA5A5', txt:'⚠ Pendiente'   }
    };
    var TIPO_CFG = {
      kits:        { emoji:'📦', label:'Recogida de kits'   },
      voluntarios: { emoji:'🤝', label:'Voluntarios'        },
      encuentro:   { emoji:'📍', label:'Punto de encuentro' },
      refugio:     { emoji:'🏠', label:'Refugio / Hospedaje'},
      emergencia:  { emoji:'🚨', label:'Emergencia'         }
    };

    function makePopup(m) {
      var tc    = TIPO_CFG[m.tipo]  || { emoji:'📌', label: m.tipo || 'Punto' };
      var badge = '';
      // Badge oferta (pins de contexto, sin estado)
      if (!m.estado) {
        badge = '<span style="font-size:10px;background:#DBEAFE;color:#1E3A5F;border:1px solid #93C5FD;border-radius:10px;padding:1px 6px;margin-left:4px;">↑ Oferta</span>';
      }
      // Badge demanda con estado
      var estadoHtml = '';
      if (m.estado) {
        var ec = ESTADO_CFG[m.estado] || ESTADO_CFG['pendiente'];
        estadoHtml = '<div style="margin-top:5px;font-size:10px;font-weight:600;color:'+ec.color+';background:'+ec.bg+';border:1px solid '+ec.border+';border-radius:8px;padding:2px 7px;display:inline-block;">'+ec.txt+'</div>';
        badge = '<span style="font-size:10px;background:#FEE2E2;color:#7F1D1D;border:1px solid #FCA5A5;border-radius:10px;padding:1px 6px;margin-left:4px;">↓ Necesidad</span>';
      }
      var direccion = m.direccion ? '<br><span style="font-size:11px;color:#555;">📍 '+m.direccion+'</span>' : '';
      var detalle   = m.detalle   ? '<div style="font-size:10px;color:#555;margin-top:3px;line-height:1.4;">'+m.detalle+'</div>' : '';
      var nota      = m.nota      ? '<div style="font-size:10px;color:#777;margin-top:4px;border-top:1px solid #eee;padding-top:4px;line-height:1.4;">'+m.nota+'</div>' : '';

      return '<div style="min-width:170px;">' +
        '<b style="font-size:12px;">'+tc.emoji+' '+tc.label+'</b>'+badge +
        direccion + detalle + nota + estadoHtml +
      '</div>';
    }

    // ── Markers ──
    var markersByTipo = {};
    TIPOS.forEach(function(t){ markersByTipo[t.tipo] = []; });
    var activeFilters = {};
    TIPOS.forEach(function(t){ activeFilters[t.tipo] = true; });

    var ICON_TO_TIPO = { 'K':'kits', 'V':'voluntarios', 'P':'encuentro', 'R':'refugio', '🚨':'emergencia' };

    function normalizarPin(m) {
      if (!m.tipo && m.icon) m.tipo = ICON_TO_TIPO[m.icon] || 'sin_clasificar';
      return m;
    }

    function addMarker(m) {
      var tipo = m.tipo || 'kits';
      var icon = (tipo === 'emergencia') ? makeEmergencyIcon(36) : makeIcon(m.color, m.icon, 26);
      var marker = L.marker([m.lat, m.lng], { icon:icon, zIndexOffset: tipo==='emergencia'?1000:500 })
        .bindPopup(makePopup(m), { maxWidth:220 })
        .addTo(map);
      if (!markersByTipo[tipo]) markersByTipo[tipo] = [];
      markersByTipo[tipo].push(marker);
    }

    ctxPins.forEach(function(m){ addMarker(normalizarPin(m)); });
    pinsValidados.forEach(function(m){ addMarker(normalizarPin(m)); });

    if (mapData.pinLat) {
      L.marker([pinLat,pinLng], { icon:pinIcon('#E24B4A'), zIndexOffset:2000 })
        .bindPopup('<b>📍 Ubicación seleccionada</b>', { maxWidth:220 })
        .addTo(map).openPopup();
    }

   
   // ── Leyenda con barras de cobertura ──
 
    function buildLegend() {
      var legend = document.getElementById('mapLegend');
      document.getElementById('legendBody').innerHTML = '';
      var body = document.getElementById('legendBody');

      TIPOS.forEach(function(t) {
        var delTipo   = pinsValidados.filter(function(p){ return p.tipo === t.tipo; });
        var total     = delTipo.length;
        var resueltas = delTipo.filter(function(p){ return p.estado === 'resuelta'; }).length;
        var pct       = total > 0 ? Math.round((resueltas / total) * 100) : 0;

        var barColor  = pct >= 66 ? '#2ecc71' : pct >= 33 ? '#EF9F27' : '#E24B4A';
        var estadoTxt = total === 0
          ? '<span style="color:#ccc;font-size:9px;">sin datos</span>'
          : '<span style="font-weight:600;">'+pct+'%</span><span style="color:#bbb;font-size:9px;margin-left:3px;">('+resueltas+'/'+total+')</span>';

        var row = document.createElement('div');
        row.className = 'map-legend-row';
        row.innerHTML =
          '<div class="map-legend-label-row">' +
            '<div class="map-legend-left">' +
              '<div class="map-legend-dot" style="background:'+t.color+';">'+t.icon+'</div>' +
              '<span class="map-legend-name">'+t.label+'</span>' +
            '</div>' +
            '<span class="map-legend-count">'+estadoTxt+'</span>' +
          '</div>' +
          '<div class="map-legend-bar-track">' +
            '<div class="map-legend-bar-fill" style="width:'+pct+'%;background:'+barColor+';opacity:0.85;"></div>' +
          '</div>';
        body.appendChild(row)
      });

      var sep = document.createElement('div'); sep.className = 'map-legend-sep';
      legend.appendChild(sep);
      var pinRow = document.createElement('div');
      pinRow.className = 'map-legend-pin-row';
      pinRow.innerHTML = '<span style="font-size:13px;">📍</span> Ubicación seleccionada';
      legend.appendChild(pinRow);
    }

    function toggleLegend() {
      var body = document.getElementById('legendBody');
      var icon = document.getElementById('legendToggleIcon');
      var collapsed = body.classList.toggle('collapsed');
      icon.textContent = collapsed ? '▼' : '▲';
    }
    buildLegend();
    
    

    // ── Filtros ──
    function toggleFilter(btn) {
      var tipo = btn.dataset.tipo;
      activeFilters[tipo] = !activeFilters[tipo];
      btn.classList.toggle('active', activeFilters[tipo]);
      (markersByTipo[tipo] || []).forEach(function(m) {
        if (activeFilters[tipo]) { m.addTo(map); } else { map.removeLayer(m); }
      });
    }

    // ── Búsqueda ──
    var searchTimeout = null;
    function onSearchInput() {
      var val = document.getElementById('searchInput').value.trim();
      clearTimeout(searchTimeout);
      if (val.length < 3) { hideResults(); return; }
      searchTimeout = setTimeout(function(){ fetchSuggestions(val); }, 380);
    }
    function fetchSuggestions(q) {
      fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&q='+encodeURIComponent(q),
        { headers:{'Accept-Language':'es'} })
        .then(function(r){ return r.json(); })
        .then(function(data) {
          var box = document.getElementById('searchResults');
          box.innerHTML = '';
          if (!data.length) { hideResults(); return; }
          data.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'map-search-result-item';
            div.textContent = item.display_name;
            div.onclick = function() {
              map.setView([parseFloat(item.lat), parseFloat(item.lon)], 16);
              document.getElementById('searchInput').value = item.display_name;
              hideResults();
            };
            box.appendChild(div);
          });
          box.classList.add('visible');
        })
        .catch(function(){ hideResults(); });
    }
    function doSearch() {
      var q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q),
        { headers:{'Accept-Language':'es'} })
        .then(function(r){ return r.json(); })
        .then(function(data) {
          hideResults();
          if (data && data[0]) map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 16);
        })
        .catch(function(){ hideResults(); });
    }
    function hideResults() {
      document.getElementById('searchResults').classList.remove('visible');
    }
    document.addEventListener('click', function(e) {
      if (!document.getElementById('searchBar').contains(e.target)) hideResults();
    });
  </script>

</body>
</html>

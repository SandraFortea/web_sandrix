<title>Sandra González — Kit2Help</title>

<style>
  :root{
    --mint:#2CD3A6; --mint-dk:#1faa84; --dark:#229175; --dark2:#1a7560;
    --bg:#0F1F1A; --surface:#FFFFFF; --text:#0F1F1A; --muted:#5E7A72;
    --border:#D8EDE8; --wa:#25D366; --wa-dk:#1DA851;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:radial-gradient(circle at 30% 0%, #163b30 0%, #0F1F1A 55%);
    color:var(--text);
    min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
  }
  /* Mobile-first: la tarjeta ES la pantalla, a sangre, sin caja flotante */
  .card{
    width:100%; min-height:100dvh;
    background:var(--surface);
    padding:48px 28px 36px;
    text-align:center;
    display:flex; flex-direction:column; justify-content:center;
    animation:rise .5s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* A partir de tablet/desktop: tarjeta centrada flotante con marco */
  @media (min-width:640px){
    body{ padding:28px 18px; }
    .card{
      width:100%; max-width:420px; min-height:0;
      border-radius:24px;
      padding:44px 36px 32px;
      box-shadow:0 30px 60px rgba(0,0,0,.35);
    }
  }

  .avatar{
    width:108px;height:108px;border-radius:50%;
    margin:0 auto 22px;
    background:linear-gradient(135deg,var(--mint) 0%,var(--dark) 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:36px; color:#fff;
    box-shadow:0 8px 20px rgba(34,145,117,.35);
  }
  /* Para usar tu foto en vez de iniciales, sustituye el div .avatar por:
     <img class="avatar" src="tu-foto.jpg" style="object-fit:cover;"> */

  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:27px; font-weight:700; letter-spacing:-.3px; line-height:1.2;
  }
  .role{
    font-size:15px; color:var(--muted); margin-top:6px; font-weight:500;
  }
  .pitch{
    font-size:16px; line-height:1.6; color:#3a4a45;
    margin:24px 0 28px;
  }

  .wa-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:var(--wa); color:#fff; text-decoration:none;
    font-weight:700; font-size:17px;
    padding:18px 18px; border-radius:14px;
    box-shadow:0 10px 22px rgba(37,211,102,.35);
    transition:transform .15s ease, background .15s ease;
  }
  .wa-btn:active{ transform:scale(.97); background:var(--wa-dk); }
  .wa-btn svg{ width:21px; height:21px; flex-shrink:0; }

  .links{
    display:flex; justify-content:center; gap:18px;
    margin-top:18px; flex-wrap:wrap;
  }
  .links a{
    font-size:14px; font-weight:600; color:var(--dark);
    text-decoration:none; border-bottom:1px solid transparent;
  }
  .links a:hover{ border-bottom-color:var(--dark); }

  .fallback{
    margin-top:28px; padding-top:20px; border-top:1px solid var(--border);
  }
  .fallback-toggle{
    background:none; border:none; cursor:pointer;
    font-size:13px; color:var(--muted); text-decoration:underline;
    font-family:inherit;
  }
  .fallback-form{
    display:none; margin-top:16px; text-align:left; gap:11px; flex-direction:column;
  }
  .fallback-form.open{ display:flex; }
  .fallback-form input,.fallback-form select{
    width:100%; padding:13px 14px; border-radius:10px;
    border:1px solid var(--border); font-size:15px; font-family:inherit;
    background:#F4F8F7; color:var(--text);
  }
  .fallback-form button{
    background:var(--dark); color:#fff; border:none; border-radius:10px;
    padding:13px; font-weight:700; font-size:15px; cursor:pointer; font-family:inherit;
  }
  .fallback-form button:disabled{ opacity:.6; cursor:default; }

  .footer-note{
    margin-top:28px; font-size:11.5px; color:#7c8f88;
  }
</style>
</head>
<body>

<div class="card">
  <div class="avatar"><img src="logo.png" alt="Kit2Help" style="height:100px;width:auto;object-fit:contain;display:block"></div>

  <h1>Sandra González Fortea</h1>
  <div class="role">CTO &amp; Co-fundadora · Kit2Help</div>

  <p class="pitch">
    Toda la información de la emergencia, repartida en mil canales —
    Kit2Help centraliza en un mapa operativo compartido y en tiempo real.
  </p>

  <!-- WHATSAPP: sustituye 34600000000 por tu número real -->
  <a class="wa-btn"
     href="https://wa.me/34679698113?text=Hola%20Sandra%2C%20me%20gustar%C3%ADa%20conocer%20m%C3%A1s%20sobre%20Kit2Help"
     target="_blank" rel="noopener"
     onclick="gtag('event','click_whatsapp',{'event_category':'contact'});">
    <svg viewBox="0 0 24 24" fill="#fff"><path d="M17.6 14.2c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.6.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.3-.4.1-.2 0-.4 0-.5C10.1 8.7 9.6 7.4 9.4 7c-.2-.4-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.3-1 1-1 2.4s1 2.8 1.1 3c.1.2 2 3 4.8 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.5-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.9.5 3.6 1.4 5.1L2 22l5-1.3c1.4.8 3.1 1.2 4.9 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3 .8.8-2.9-.2-.3C4.2 15 3.7 13.5 3.7 12c0-4.6 3.7-8.3 8.3-8.3s8.3 3.7 8.3 8.3-3.7 8.3-8.3 8.3z"/></svg>
    Hablemos por WhatsApp
  </a>

  <div class="links">
    <a href="Kit2Help_OnePager_Inversor.html" target="_blank" rel="noopener">One-pager</a>
    <a href="https://www.linkedin.com/in/kit2help" target="_blank" rel="noopener">LinkedIn</a>
    <a href="mailto:kit2help.info@gmail.com">Email</a>
  </div>

  <div class="fallback">
    <button class="fallback-toggle" onclick="toggleFallback()">Prefiero dejar mis datos</button>
    <div class="fallback-form" id="fallbackForm">
      <input type="text" id="k2-honeypot" style="display:none" tabindex="-1" autocomplete="off">
      <input type="text" id="k2-name" placeholder="Nombre">
      <input type="text" id="k2-city" placeholder="Ciudad">
      <input type="email" id="k2-email" placeholder="Correo electrónico (Obligatorio)" required>
      <input type="tel" id="k2-phone" placeholder="Teléfono">
      <select id="k2-type">
        <option value="">Tipo de perfil</option>
        <option value="Inversor">Inversor</option>
        <option value="Organización">Organización</option>
        <option value="Administración">Administración</option>
        <option value="Voluntario">Voluntario</option>
      </select>
      <button onclick="submitLead()" class="k2-submit">Enviar solicitud</button>
    </div>
  </div>

  <div class="footer-note">Kit2Help · 2026</div>
</div>

<script>
function toggleFallback(){
  document.getElementById('fallbackForm').classList.toggle('open');
}

async function submitLead() {
  const honey = document.getElementById('k2-honeypot').value;
  if (honey !== "") { return; }

  const name = document.getElementById('k2-name').value.trim();
  const email = document.getElementById('k2-email').value.trim();
  const city = document.getElementById('k2-city').value.trim();
  const phone = document.getElementById('k2-phone').value.trim();
  const type = document.getElementById('k2-type').value;
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!name) { alert("Por favor, dinos tu nombre."); return; }
  if (!emailRegex.test(email)) { alert("Por favor, introduce un correo electrónico válido."); return; }

  const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwCNRCqioHrJOVEdKGayVEWTYB889V4aupiBpidTMHtaaJzphhcTQGtAEyXl95hDvYa/exec";
  const btn = document.querySelector('.k2-submit');

  try {
    btn.textContent = "Enviando..."; btn.disabled = true;
    await fetch(URL_APPS_SCRIPT, {
      method: "POST", mode: "no-cors",
      body: JSON.stringify({ name, city, email, phone: phone || "No proporcionado", type })
    });
    btn.textContent = "✓ Enviado";
    btn.style.background = "#085041";
    setTimeout(() => {
      btn.textContent = "Enviar solicitud"; btn.style.background = ""; btn.disabled = false;
      document.getElementById('k2-name').value = "";
      document.getElementById('k2-email').value = "";
      document.getElementById('k2-city').value = "";
      document.getElementById('k2-phone').value = "";
      document.getElementById('fallbackForm').classList.remove('open');
    }, 1800);
  } catch (error) {
    alert("Hubo un problema. Revisa tu conexión.");
    btn.disabled = false; btn.textContent = "Enviar solicitud";
  }
}
</script>
